<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ロジックロール（LOGIC ROLL）へのお問い合わせ。取材・コラボ・フィードバックはこちらから。">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://logic-roll.com/contact.html">
  <title>お問い合わせ｜ロジックロール（LOGIC ROLL）公式サイト</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+JP:wght@400;700;900&family=Ubuntu:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260608">
</head>
<body class="subpage">
  <div id="top" aria-hidden="true"></div>
  <div class="page-bg" aria-hidden="true"></div>

  <header class="global-nav">
    <div class="global-nav__inner">
      <a href="index.html#top" class="global-nav__logo" aria-label="LOGIC ROLL トップへ">
        <span class="global-nav__logo-main">LOGIC</span>
        <span class="global-nav__logo-accent">ROLL</span>
      </a>
      <nav class="global-nav__menu" aria-label="メインメニュー">
        <a href="index.html#top" class="nav-item nav-item--external">
          <span class="nav-item__en">TOP</span>
          <span class="nav-item__ja">トップ</span>
        </a>
        <a href="index.html#system" class="nav-item nav-item--external">
          <span class="nav-item__en">SYSTEM</span>
          <span class="nav-item__ja">システム</span>
        </a>
        <a href="gallery.html" class="nav-item nav-item--external">
          <span class="nav-item__en">GALLERY</span>
          <span class="nav-item__ja">ギャラリー</span>
        </a>
        <a href="contact.html" class="nav-item is-active nav-item--external" aria-current="page">
          <span class="nav-item__en">CONTACT</span>
          <span class="nav-item__ja">コンタクト</span>
        </a>
      </nav>
      <button type="button" class="global-nav__toggle" aria-expanded="false" aria-controls="nav-menu-mobile" aria-label="メニューを開く">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav id="nav-menu-mobile" class="global-nav__mobile" aria-label="モバイルメニュー" hidden></nav>
  </header>

  <main class="main-content main-content--subpage">
    <section class="page-section page-section--contact" id="contact">
      <div class="section-inner">
        <header class="section-header">
          <span class="section-header__eyebrow">CONTACT</span>
          <h1 class="section-header__title">お問い合わせ</h1>
          <p class="section-header__lead">
            いつも当サークルの活動をご覧いただきありがとうございます。<br>
            作品へのご感想やお問い合わせ、その他ご用件がございましたら、どうぞお気軽にお寄せください。<br>
            送信後、自動返信メールをお送りいたします。<br>
            お返事にお時間をいただく場合がございますが、あらかじめご了承いただけますと幸いです。
          </p>
        </header>

        <form class="contact-form" id="contact-form" novalidate>
          <div class="form-row">
            <label class="form-label" for="contact-name">お名前 <span class="form-required">必須</span></label>
            <input
              class="form-input"
              type="text"
              id="contact-name"
              name="name"
              required
              maxlength="80"
              placeholder="例：山田 太郎"
              autocomplete="name"
            >
          </div>

          <div class="form-row">
            <label class="form-label" for="contact-email">メールアドレス <span class="form-required">必須</span></label>
            <input
              class="form-input"
              type="email"
              id="contact-email"
              name="email"
              required
              maxlength="254"
              placeholder="例：example@email.com"
              autocomplete="email"
            >
          </div>

          <div class="form-row">
            <label class="form-label" for="contact-subject">件名 <span class="form-required">必須</span></label>
            <input
              class="form-input"
              type="text"
              id="contact-subject"
              name="subject"
              required
              maxlength="120"
            >
          </div>

          <div class="form-row">
            <label class="form-label" for="contact-message">お問い合わせ内容 <span class="form-required">必須</span></label>
            <textarea
              class="form-input form-textarea"
              id="contact-message"
              name="message"
              required
              maxlength="3000"
              rows="7"
              placeholder="お問い合わせ内容をご記入ください"
            ></textarea>
          </div>

          <p class="contact-form__status" id="contact-status" role="status" aria-live="polite"></p>

          <button type="submit" class="contact-form__submit" id="contact-submit">
            <span class="contact-form__submit-text">送信する</span>
          </button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-copy">&copy; 2026 ロジックロール（LOGIC ROLL）Project</p>
      <a
        href="https://x.com/logicroll_info"
        class="footer-x-btn"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="公式X（Twitter）をフォロー"
      >
        <svg class="footer-x-btn__icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        <span>Follow on X</span>
      </a>
    </div>
  </footer>

  <a class="back-to-top" href="#top" aria-label="ページ上部へ戻る">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <path fill="currentColor" d="M12 4 4.7 11.3a1 1 0 0 0 1.4 1.4L11 7.8V20a1 1 0 1 0 2 0V7.8l4.9 4.9a1 1 0 1 0 1.4-1.4z"/>
    </svg>
  </a>

  <script src="js/reveal.js" defer></script>
  <script src="js/contact.js"></script>
  <script>
    (function () {
      const navToggle = document.querySelector(".global-nav__toggle");
      const mobileNav = document.getElementById("nav-menu-mobile");
      const desktopMenu = document.querySelector(".global-nav__menu");

      if (desktopMenu && mobileNav) {
        mobileNav.innerHTML = desktopMenu.innerHTML;
        mobileNav.querySelectorAll("a").forEach((a) => {
          a.addEventListener("click", () => {
            mobileNav.hidden = true;
            navToggle?.setAttribute("aria-expanded", "false");
          });
        });
      }

      if (navToggle && mobileNav) {
        navToggle.addEventListener("click", () => {
          const open = mobileNav.hidden;
          mobileNav.hidden = !open;
          navToggle.setAttribute("aria-expanded", open ? "true" : "false");
          navToggle.setAttribute("aria-label", open ? "メニューを閉じる" : "メニューを開く");
        });
      }
    })();
  </script>
</body>
</html>
