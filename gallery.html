  <script>
    (function () {
      const navToggle = document.querySelector(".global-nav__toggle");
      const mobileNav = document.getElementById("nav-menu-mobile");
      const desktopMenu = document.querySelector(".global-nav__menu");

      if (desktopMenu && mobileNav) {
        mobileNav.innerHTML = desktopMenu.innerHTML;
        mobileNav.querySelectorAll("a").forEach((a) => {
          a.addEventListener("click", () => {
            mobileNav.hidden = true;
            navToggle?.setAttribute("aria-expanded", "false");
          });
        });
      }

      if (navToggle && mobileNav) {
        navToggle.addEventListener("click", () => {
          const open = mobileNav.hidden;
          mobileNav.hidden = !open;
          navToggle.setAttribute("aria-expanded", open ? "true" : "false");
          navToggle.setAttribute("aria-label", open ? "メニューを閉じる" : "メニューを開く");
        });
      }
    })();

    (function () {
      const lightbox = document.getElementById("gallery-lightbox");
      const inner = lightbox?.querySelector(".gallery-lightbox__inner");
      const lightboxImg = lightbox?.querySelector(".gallery-lightbox__img");
      const closeBtn = lightbox?.querySelector(".gallery-lightbox__close");
      if (!lightbox || !inner || !lightboxImg || !closeBtn) return;

      function openLightbox(src, alt) {
        lightboxImg.src = src;
        lightboxImg.alt = alt || "";
        lightbox.showModal();
      }

      inner.addEventListener("click", (e) => {
        if (e.target === inner) lightbox.close();
      });

      closeBtn.addEventListener("click", () => lightbox.close());

      lightbox.addEventListener("close", () => {
        lightboxImg.removeAttribute("src");
        lightboxImg.alt = "";
      });

      document.querySelectorAll(".gallery-item").forEach((btn, i) => {
        if (!btn.querySelector("img")) return;
        if (!btn.getAttribute("aria-label")) {
          btn.setAttribute("aria-label", `画像 ${i + 1} を拡大表示`);
        }
        btn.addEventListener("click", () => {
          const img = btn.querySelector("img");
          if (img) openLightbox(img.currentSrc || img.src, img.alt);
        });
      });
    })();
  </script>
